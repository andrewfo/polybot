<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crypto AI Slave 3000</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg-void: #030509;
        --bg-primary: #060a14;
        --bg-card: #0a0f1e;
        --bg-card-hover: #0e1428;
        --cyan: #00e5ff;
        --cyan-dim: rgba(0, 229, 255, 0.07);
        --cyan-glow: rgba(0, 229, 255, 0.25);
        --blue: #0070ff;
        --neon-green: #00ff88;
        --hot-red: #ff3366;
        --amber: #ffaa00;
        --text-primary: #e4eaf6;
        --text-secondary: #8899bb;
        --text-muted: #556688;
        --border: rgba(0, 229, 255, 0.06);
        --border-hover: rgba(0, 229, 255, 0.15);
      }

      body {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-void);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      /* Animated grid background */
      body::before {
        content: '';
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background-image:
          linear-gradient(rgba(0, 229, 255, 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 229, 255, 0.015) 1px, transparent 1px);
        background-size: 60px 60px;
        animation: gridShift 20s linear infinite;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes gridShift {
        0% { background-position: 0 0; }
        100% { background-position: 60px 60px; }
      }

      /* Scrollbars */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.15); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0, 229, 255, 0.3); }
      ::selection { background: rgba(0, 229, 255, 0.2); color: #fff; }

      /* Global animations */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.5); }
      }

      @keyframes borderGlow {
        0%, 100% { border-color: rgba(0, 229, 255, 0.06); }
        50% { border-color: rgba(0, 229, 255, 0.18); }
      }

      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes scanline {
        0% { top: -4px; }
        100% { top: 100%; }
      }

      @keyframes textGlow {
        0%, 100% { text-shadow: 0 0 8px rgba(0, 229, 255, 0.3); }
        50% { text-shadow: 0 0 16px rgba(0, 229, 255, 0.6), 0 0 32px rgba(0, 229, 255, 0.2); }
      }

      @keyframes orbFloat {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(30px, -20px) scale(1.05); }
        66% { transform: translate(-20px, 15px) scale(0.95); }
      }

      @keyframes dataStream {
        0% { opacity: 0; transform: translateY(-10px); }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { opacity: 0; transform: translateY(10px); }
      }

      @keyframes barFill {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }

      @keyframes borderRotate {
        0% { --angle: 0deg; }
        100% { --angle: 360deg; }
      }

      @keyframes glitchSlice {
        0%, 100% { clip-path: inset(0 0 100% 0); }
        20% { clip-path: inset(20% 0 60% 0); }
        40% { clip-path: inset(60% 0 20% 0); }
        60% { clip-path: inset(40% 0 40% 0); }
        80% { clip-path: inset(80% 0 5% 0); }
      }

      /* Focus styles */
      input:focus, select:focus {
        outline: none;
        border-color: var(--cyan) !important;
        box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.1), 0 0 20px rgba(0, 229, 255, 0.05);
      }

      /* Button hover glow */
      button {
        position: relative;
      }

      /* Select option styling */
      option {
        background: #0a0f1e;
        color: #e4eaf6;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
