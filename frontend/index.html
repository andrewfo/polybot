<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polybot</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      /* ---- "The Ledger" — warm ink, brass accent, hairline rules ---- */
      :root {
        --bg-void: #0b0c0e;
        --bg-primary: #0e0f12;
        --bg-card: #15161a;
        --bg-card-hover: #1a1b21;
        --brass: #c5a572;
        --brass-dim: rgba(197, 165, 114, 0.10);
        --emerald: #3fb970;
        --crimson: #e5484d;
        --amber: #d9a03f;
        --text-primary: #e9e6df;
        --text-secondary: #a3a099;
        --text-muted: #6e6c66;
        --border: rgba(233, 230, 223, 0.08);
        --border-hover: rgba(197, 165, 114, 0.45);
      }

      html { background: var(--bg-primary); }

      body {
        font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        font-variant-numeric: tabular-nums;
      }

      /* ---- Panel utility (legacy class name kept) — flat ink panel ---- */
      .liquid-glass {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 4px;
        transition: border-color 0.2s ease;
      }
      .liquid-glass::before, .liquid-glass::after { content: none; }
      .liquid-glass:hover { border-color: rgba(233, 230, 223, 0.16); }

      /* Scrollbars */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(233, 230, 223, 0.14); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(233, 230, 223, 0.28); }
      ::selection { background: rgba(197, 165, 114, 0.35); color: #0e0f12; }

      /* ---- Animations (names preserved for component references) ---- */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.45; }
        50% { opacity: 1; }
      }

      @keyframes borderGlow {
        0%, 100% { border-color: rgba(233, 230, 223, 0.08); }
        50% { border-color: rgba(233, 230, 223, 0.18); }
      }

      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes scanline {
        0% { top: -4px; }
        100% { top: 100%; }
      }

      /* Once a glow pulse — now a quiet opacity breath */
      @keyframes textGlow {
        0%, 100% { opacity: 0.65; }
        50% { opacity: 1; }
      }

      @keyframes orbFloat {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(0, -4px); }
      }

      @keyframes dataStream {
        0% { opacity: 0; transform: translateY(-6px); }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { opacity: 0; transform: translateY(6px); }
      }

      @keyframes barFill {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }

      @keyframes borderRotate {
        0% { --angle: 0deg; }
        100% { --angle: 360deg; }
      }

      @keyframes twinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      @keyframes tabSwoop {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes floatY {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-3px); }
      }

      @keyframes hueCycle {
        0%, 100% { opacity: 1; }
      }

      @keyframes gradientFlow {
        0%, 100% { background-position: 0% 50%; }
        50%      { background-position: 100% 50%; }
      }

      /* Value change ticks — a brief color-true flash, no glow */
      @keyframes flashUp {
        0%   { color: #3fb970; }
        60%  { color: #3fb970; }
        100% { color: inherit; }
      }
      @keyframes flashDown {
        0%   { color: #e5484d; }
        60%  { color: #e5484d; }
        100% { color: inherit; }
      }
      @keyframes flashNeutral {
        0%   { color: #d9a03f; }
        60%  { color: #d9a03f; }
        100% { color: inherit; }
      }

      @keyframes glitchSlice {
        0%, 100% { clip-path: inset(0 0 0 0); }
      }

      @keyframes slowDrift {
        0%, 100% { transform: none; }
      }

      /* Focus styles — hairline brass ring */
      input:focus, select:focus {
        outline: none;
        border-color: rgba(197, 165, 114, 0.55) !important;
        box-shadow: 0 0 0 2px rgba(197, 165, 114, 0.15);
      }

      /* Select option styling */
      option {
        background: #15161a;
        color: #e9e6df;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
